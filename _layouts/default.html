<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
{% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    <!--[if lt IE 9]>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
    <![endif]-->
  </head>
  <body>
    <!-- 3D WebGL Background -->
    <div id="vanta-bg" style="position: fixed; z-index: -1; width: 100vw; height: 100vh; top: 0; left: 0;"></div>
    
    <div class="wrapper">
      <!-- Global Navigation (Hidden on Home Page) -->
      {% if page.url != '/' %}
      <nav class="glass-nav" data-aos="fade-down">
        <a href="{{ '/' | relative_url }}" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          Home
        </a>
        <a href="{{ '/blog/' | relative_url }}" class="nav-link {% if page.url contains '/blog' %}active{% endif %}">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"></path><path d="M18 14h-8"></path><path d="M15 18h-5"></path><path d="M10 6h8v4h-8V6Z"></path></svg>
          Blog
        </a>
        <a href="{{ '/projects/' | relative_url }}" class="nav-link {% if page.url contains '/projects' %}active{% endif %}">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
          Projects
        </a>
        <a href="{{ '/cv/' | relative_url }}" class="nav-link {% if page.url contains '/cv' %}active{% endif %}">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          CV
        </a>
      </nav>
      {% endif %}

      <section class="glass-container main-content {% if page.url == '/' %}transparent-container{% endif %}">
        {{ content }}
      </section>
      
      <footer class="glass-footer {% if page.url == '/' %}transparent-container{% endif %}" data-aos="fade-in" data-aos-delay="200">
        <p>&copy; {{ 'now' | date: "%Y" }} Aashutosh Joshi</p>
        <p><small>Building complex systems with elegant code.</small></p>
      </footer>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    
    <script>
      // Initialize 3D WebGL NET Background
      VANTA.NET({
        el: "#vanta-bg",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.00,
        minWidth: 200.00,
        scale: 1.00,
        scaleMobile: 1.00,
        color: 0x333333, // DIMMED for Eclipse aesthetic
        backgroundColor: 0x121212, // Charcoal Black background
        points: 15.00,
        maxDistance: 24.00,
        spacing: 20.00
      });

      // Initialize Custom 3D Wireframe Globe
      const globeContainer = document.getElementById("vanta-globe-nav");
      if (globeContainer) {
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, globeContainer.clientWidth / globeContainer.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        
        renderer.setSize(globeContainer.clientWidth, globeContainer.clientHeight);
        globeContainer.appendChild(renderer.domElement);
        
        const sphereGroup = new THREE.Group();

        // The AI Data Core (Particle System)
        const particleCount = 2500;
        const particleGeo = new THREE.BufferGeometry();
        const particlePos = new Float32Array(particleCount * 3);

        for(let i=0; i < particleCount; i++) {
            // Spherical coordinate math for even distribution
            const u = Math.random();
            const v = Math.random();
            const theta = u * 2.0 * Math.PI;
            const phi = Math.acos(2.0 * v - 1.0);
            
            // Randomize radius slightly to give it volumetric depth (radius 14 to 15.5)
            const r = 14 + Math.random() * 1.5; 

            particlePos[i*3] = r * Math.sin(phi) * Math.cos(theta);
            particlePos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
            particlePos[i*3+2] = r * Math.cos(phi);
        }

        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
        const particleMat = new THREE.PointsMaterial({
            color: 0xfdfbf7,
            size: 0.15,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending // Gives a glowing effect when particles overlap
        });

        const particleSphere = new THREE.Points(particleGeo, particleMat);
        sphereGroup.add(particleSphere);
        
        // Dark solid inner core to block background lines and add depth
        const innerMaterial = new THREE.MeshBasicMaterial({ color: 0x121212 });
        const innerSphere = new THREE.Mesh(new THREE.IcosahedronGeometry(13.8, 2), innerMaterial);
        sphereGroup.add(innerSphere);
        
        scene.add(sphereGroup);
        
        camera.position.z = 32; 
        
        // Mouse interaction for rotation
        let mouseX = 0;
        let mouseY = 0;
        document.addEventListener('mousemove', (event) => {
          mouseX = (event.clientX / window.innerWidth) * 2 - 1;
          mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        // Interactive Glow Logic
        const hudButtons = document.querySelectorAll('.hud-btn');
        let targetOpacity = 0.6; // Base opacity for the particle core
        let glowHoverCount = 0;

        function updateGlowState() {
          if (glowHoverCount > 0) {
            targetOpacity = 0.95; // Brighten the core material
            globeContainer.style.filter = "drop-shadow(0 0 40px rgba(253, 251, 247, 0.4))"; // Outer glow
          } else {
            targetOpacity = 0.6;
            globeContainer.style.filter = "drop-shadow(0 0 0px rgba(253, 251, 247, 0))";
          }
        }

        // 1. Hover on specific navigation link
        hudButtons.forEach(btn => {
          btn.addEventListener('mouseenter', () => {
            glowHoverCount++;
            btn.classList.add('active-glow');
            updateGlowState();
          });
          btn.addEventListener('mouseleave', () => {
            glowHoverCount--;
            btn.classList.remove('active-glow');
            updateGlowState();
          });
        });

        // 2. Hover directly on the 3D core
        globeContainer.addEventListener('mouseenter', () => {
          glowHoverCount++;
          hudButtons.forEach(b => b.classList.add('active-glow'));
          updateGlowState();
        });
        globeContainer.addEventListener('mouseleave', () => {
          glowHoverCount--;
          hudButtons.forEach(b => b.classList.remove('active-glow'));
          updateGlowState();
        });
        
        function animate() {
          requestAnimationFrame(animate);

          // Smoothly interpolate material opacity for glowing effect
          particleMat.opacity += (targetOpacity - particleMat.opacity) * 0.1;
          
          // Auto rotate slowly
          sphereGroup.rotation.y += 0.002;
          sphereGroup.rotation.x += 0.001;
          
          // React to mouse
          sphereGroup.rotation.y += mouseX * 0.01;
          sphereGroup.rotation.x += mouseY * 0.01;
          
          renderer.render(scene, camera);
        }
        animate();
      }

      // Initialize Scroll Animations
      AOS.init({
        duration: 1000,
        once: false,
        offset: 50,
      });

      // Initialize Crazy 3D Card Tilt
      VanillaTilt.init(document.querySelectorAll(".tilt-card"), {
        max: 20,           // Aggressive tilt limit
        speed: 400,        // Fast response
        glare: true,
        "max-glare": 0.4,  // High gloss glare
        scale: 1.05        // Card jumps forward on hover
      });
    </script>
  </body>
</html>
