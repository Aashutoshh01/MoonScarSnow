<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
{% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    <!--[if lt IE 9]>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
    <![endif]-->
  </head>
  <body>
    <!-- 3D WebGL Background -->
    <div id="vanta-bg" style="position: fixed; z-index: -1; width: 100vw; height: 100vh; top: 0; left: 0;"></div>
    
    <div class="wrapper">
      <!-- Global Navigation (Hidden on Home Page) -->
      {% if page.url != '/' %}
      <nav class="glass-nav" data-aos="fade-down">
        <a href="{{ '/' | relative_url }}" class="nav-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          Home
        </a>
        <a href="{{ '/blog/' | relative_url }}" class="nav-link {% if page.url contains '/blog' %}active{% endif %}">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"></path><path d="M18 14h-8"></path><path d="M15 18h-5"></path><path d="M10 6h8v4h-8V6Z"></path></svg>
          Blog
        </a>
        <a href="{{ '/projects/' | relative_url }}" class="nav-link {% if page.url contains '/projects' %}active{% endif %}">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
          Projects
        </a>
        <a href="{{ '/cv/' | relative_url }}" class="nav-link {% if page.url contains '/cv' %}active{% endif %}">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          CV
        </a>
      </nav>
      {% endif %}

      <section class="glass-container main-content">
        {{ content }}
      </section>
      
      <footer class="glass-footer" data-aos="fade-in" data-aos-delay="200">
        <p>&copy; {{ 'now' | date: "%Y" }} Aashutosh Joshi</p>
        <p><small>Building complex systems with elegant code.</small></p>
      </footer>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.globe.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    
    <script>
      // Initialize 3D WebGL NET Background
      VANTA.NET({
        el: "#vanta-bg",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.00,
        minWidth: 200.00,
        scale: 1.00,
        scaleMobile: 1.00,
        color: 0xfdfbf7, // Cream color for the 3D network lines
        backgroundColor: 0x121212, // Charcoal Black background
        points: 15.00,
        maxDistance: 24.00,
        spacing: 20.00
      });

      // Initialize the Floating Transparent Globe Navigation Hub
      if (document.getElementById("vanta-globe-nav")) {
        VANTA.GLOBE({
          el: "#vanta-globe-nav",
          mouseControls: true,
          touchControls: true,
          gyroControls: false,
          minHeight: 350.00,
          minWidth: 350.00,
          scale: 1.00,
          scaleMobile: 1.00,
          color: 0xfdfbf7,      // Cream globe lines
          color2: 0x8a8a8a,     // Secondary color
          size: 1.00,
          backgroundColor: 0x121212,
          backgroundAlpha: 0.0  // Transparent background so it floats!
        });
      }

      // Initialize Scroll Animations
      AOS.init({
        duration: 1000,
        once: false,
        offset: 50,
      });

      // Initialize Crazy 3D Card Tilt
      VanillaTilt.init(document.querySelectorAll(".tilt-card"), {
        max: 20,           // Aggressive tilt limit
        speed: 400,        // Fast response
        glare: true,
        "max-glare": 0.4,  // High gloss glare
        scale: 1.05        // Card jumps forward on hover
      });
    </script>
  </body>
</html>
